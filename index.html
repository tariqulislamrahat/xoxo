<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOXO</title>
    <link rel="icon" href="../img/bar.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: url('../img/bg.svg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .game-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            transition: box-shadow 0.5s ease;
        }

        .game-container:hover {
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.7);
        }

        .player-turn {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: color 0.3s ease;
        }

        .player-turn span {
            color: #ff002b;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            justify-content: center;
        }

        .cell {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #ffffff;
            border: 3px solid #00d0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
            animation: popIn 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .cell:hover {
            background: #f0f0f0;
            transform: scale(1.05);
            box-shadow: 0 0 10px #00d0ff;
        }

        .cell.x, .cell.o {
            animation: markAppear 0.5s ease;
        }

        @keyframes markAppear {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .cell.x {
            color: #00d0ff;
            text-shadow: 0 0 10px #00d0ff;
        }

        .cell.o {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }

        .cell.will-remove {
            border: 3px solid rgba(255, 255, 0, 0.6);
            animation: pulseWarning 1.5s ease-in-out infinite;
        }

        @keyframes pulseWarning {
            0%, 100% {
                border-color: rgba(255, 255, 0, 0.6);
                box-shadow: 0 0 0 0 rgba(255, 255, 0, 0.3);
            }
            50% {
                border-color: rgba(255, 255, 0, 1);
                box-shadow: 0 0 0 6px rgba(255, 255, 0, 0);
            }
        }

        .cell.removing {
            animation: fadeOut 0.6s ease forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.5); }
        }

        .player-info {
            margin-top: 20px;
            color: white;
        }

        .reset-btn {
            background: #ff002b;
            border: 3px solid #00d0ff;
            color: #ffffff;
            padding: 10px 20px;
            font-size: 1rem;
            font-family: 'Orbitron', sans-serif;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .reset-btn:hover {
            background: #ff0000;
            transform: scale(1.05);
            box-shadow: 0 0 10px #ff0000;
        }

        .winner-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            display: none;
            width: 80%;
            max-width: 400px;
            animation: popUp 0.5s ease;
        }

        .winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        @keyframes popUp {
            from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .credit {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ffffff;
            text-align: center; 
        }

        .credit a {
            color: #ff0000;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .credit a:hover {
            color: #00d0ff;
            text-decoration: underline;
        }

        @media (min-width: 768px) {
            .player-turn {
                font-size: 2rem;
            }

            .cell {
                font-size: 3.5rem;
            }

            .reset-btn {
                font-size: 1.2rem;
            }

            .winner-message {
                font-size: 1.2rem;
            }
        }

        @media (min-width: 1024px) {
            .game-container {
                padding: 40px;
            }

            .player-turn {
                font-size: 2.2rem;
            }

            .cell {
                font-size: 4rem;
            }

            .reset-btn {
                font-size: 1.4rem;
                padding: 12px 24px;
            }

            .winner-message {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="player-turn"><span id="currentPlayer">X</span>'s Turn</div>
        <div class="board" id="board"></div><br>
        <button class="reset-btn" onclick="resetGame()">RESET</button>
    </div>

    <div id="winnerOverlay" class="winner-overlay" onclick="resetGame()"></div>
    <div id="winnerMessage" class="winner-message">
        <h2 id="winnerText"></h2>
        <button class="reset-btn" onclick="resetGame()">Play Again</button>
    </div>

   <script>
        const BOARD_SIZE = 9;
        const MAX_MOVES_PER_PLAYER = 3;
        const REPEAT_DRAW_LIMIT = 3;
        const HUMAN_PLAYER = 'x';
        const AI_PLAYER = 'o';
        const OUTCOME_AI_WIN = 1;
        const OUTCOME_DRAW = 0;
        const OUTCOME_AI_LOSS = -1;

        let currentPlayer = HUMAN_PLAYER;
        let board = Array(BOARD_SIZE).fill(null);
        let xMoves = [];
        let oMoves = [];
        let gameOver = false;
        let isAnimating = false;
        let moveCount = 0;
        let stateHistory = new Map();
        let perfectSolver = null;
        let aiTimer = null;

        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        const POSITION_WEIGHTS = [3, 2, 3, 2, 5, 2, 3, 2, 3];

        function createBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';

            for (let i = 0; i < BOARD_SIZE; i++) {
                const cell = document.createElement('button');
                cell.type = 'button';
                cell.className = 'cell';
                cell.dataset.index = String(i);
                cell.setAttribute('role', 'gridcell');
                cell.setAttribute('aria-label', `Cell ${i + 1}`);
                cell.addEventListener('click', handleCellClick);
                boardElement.appendChild(cell);
            }
        }

        function handleCellClick(event) {
            if (currentPlayer !== HUMAN_PLAYER || gameOver || isAnimating) return;

            const index = Number(event.currentTarget.dataset.index);
            if (board[index]) return;

            const removed = placeMove(index);
            if (gameOver) return;

            clearTimeout(aiTimer);
            aiTimer = setTimeout(aiMove, removed ? 700 : 260);
        }

        function placeMove(index) {
            if (gameOver || board[index]) return false;

            const player = currentPlayer;
            board[index] = player;
            renderPlacedMark(index, player);

            const removed = trackPlayerMoves(player, index);
            moveCount++;

            if (checkWinForMoves(getMovesForPlayer(player))) {
                showWinner(player);
                updateWillRemoveVisuals();
                return removed;
            }

            switchPlayer();

            if (moveCount > BOARD_SIZE && recordState() >= REPEAT_DRAW_LIMIT) {
                showDraw();
            } else {
                updateWillRemoveVisuals();
            }

            return removed;
        }

        function renderPlacedMark(index, player) {
            const cell = getCell(index);
            if (!cell) return;

            cell.classList.remove('x', 'o', 'removing', 'will-remove');
            cell.textContent = player.toUpperCase();
            cell.classList.add(player);
            cell.setAttribute('aria-label', `Cell ${index + 1}: ${player.toUpperCase()}`);
        }

        function trackPlayerMoves(player, index) {
            const movesArray = getMovesForPlayer(player);
            movesArray.push(index);

            if (movesArray.length <= MAX_MOVES_PER_PLAYER) return false;

            isAnimating = true;
            const oldestMove = movesArray.shift();
            const oldestCell = getCell(oldestMove);
            board[oldestMove] = null;

            if (oldestCell) {
                oldestCell.classList.add('removing');
                setTimeout(() => {
                    oldestCell.textContent = '';
                    oldestCell.className = 'cell';
                    oldestCell.setAttribute('aria-label', `Cell ${oldestMove + 1}`);
                    isAnimating = false;
                    updateWillRemoveVisuals();
                }, 520);
            } else {
                isAnimating = false;
            }

            return true;
        }

        function updateWillRemoveVisuals() {
            document.querySelectorAll('.will-remove').forEach(cell => cell.classList.remove('will-remove'));
            if (gameOver) return;

            if (xMoves.length === MAX_MOVES_PER_PLAYER) {
                getCell(xMoves[0])?.classList.add('will-remove');
            }

            if (oMoves.length === MAX_MOVES_PER_PLAYER) {
                getCell(oMoves[0])?.classList.add('will-remove');
            }
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === HUMAN_PLAYER ? AI_PLAYER : HUMAN_PLAYER;
            document.getElementById('currentPlayer').textContent = currentPlayer.toUpperCase();
        }

        function checkWinForMoves(moves) {
            if (moves.length < MAX_MOVES_PER_PLAYER) return false;
            return winPatterns.some(pattern => pattern.every(index => moves.includes(index)));
        }

        function showWinner(player) {
            showEndMessage(player === HUMAN_PLAYER ? 'You Win!' : 'AI Wins!');
        }

        function showDraw() {
            showEndMessage("It's a Draw!");
        }

        function showEndMessage(message) {
            clearTimeout(aiTimer);
            gameOver = true;
            document.getElementById('winnerText').textContent = message;
            document.getElementById('winnerMessage').style.display = 'block';
            document.getElementById('winnerOverlay').style.display = 'block';
        }

        function getMovesForPlayer(player) {
            return player === HUMAN_PLAYER ? xMoves : oMoves;
        }

        function getCell(index) {
            return document.querySelector(`[data-index="${index}"]`);
        }

        function getStateKey(xM, oM, turn) {
            return `${xM.join(',')}|${oM.join(',')}|${turn}`;
        }

        function stateKey(state) {
            return getStateKey(state.x, state.o, state.turn);
        }

        function recordState() {
            const key = getStateKey(xMoves, oMoves, currentPlayer);
            const nextCount = (stateHistory.get(key) || 0) + 1;
            stateHistory.set(key, nextCount);
            return nextCount;
        }

        function resetGame() {
            clearTimeout(aiTimer);
            board = Array(BOARD_SIZE).fill(null);
            currentPlayer = HUMAN_PLAYER;
            xMoves = [];
            oMoves = [];
            gameOver = false;
            isAnimating = false;
            moveCount = 0;
            stateHistory = new Map();

            document.getElementById('currentPlayer').textContent = 'X';
            document.getElementById('winnerMessage').style.display = 'none';
            document.getElementById('winnerOverlay').style.display = 'none';
            createBoard();
            recordState();
            updateWillRemoveVisuals();
        }

        // Perfect AI for the disappearing-piece game.
        // It solves the complete reachable state graph once, then uses that
        // game-theory table to choose the best move from the current state.
        function aiMove() {
            if (gameOver) return;

            if (isAnimating) {
                aiTimer = setTimeout(aiMove, 80);
                return;
            }

            if (currentPlayer !== AI_PLAYER) return;

            const move = findBestMove();
            if (move !== undefined) {
                placeMove(move);
            }
        }

        function findBestMove() {
            const legalMoves = getEmptyFromMoves(xMoves, oMoves);
            if (legalMoves.length === 0) return undefined;

            const solver = getPerfectSolver();
            const state = { x: [...xMoves], o: [...oMoves], turn: AI_PLAYER };

            const options = legalMoves.map(pos => {
                const nextState = applyStateMove(state, pos);
                const node = solver.nodes.get(stateKey(nextState));

                return {
                    pos,
                    outcome: node ? node.value : evaluateEmergencyState(nextState),
                    depth: node ? node.depth : Infinity,
                    tieScore: scoreMoveShape(nextState, pos)
                };
            });

            options.sort(compareAiOptions);
            return options[0].pos;
        }

        function getPerfectSolver() {
            if (!perfectSolver) {
                perfectSolver = buildPerfectSolver();
            }
            return perfectSolver;
        }

        function buildPerfectSolver() {
            const nodes = new Map();
            const queue = [];
            const startState = { x: [], o: [], turn: HUMAN_PLAYER };
            const startNode = createSolverNode(startState);

            nodes.set(startNode.key, startNode);
            queue.push(startNode);

            for (let cursor = 0; cursor < queue.length; cursor++) {
                const node = queue[cursor];
                if (getWinner(node.state)) continue;

                for (const pos of getEmptyFromMoves(node.state.x, node.state.o)) {
                    const nextState = applyStateMove(node.state, pos);
                    const nextKey = stateKey(nextState);
                    let nextNode = nodes.get(nextKey);

                    if (!nextNode) {
                        nextNode = createSolverNode(nextState);
                        nodes.set(nextKey, nextNode);
                        queue.push(nextNode);
                    }

                    node.successors.push(nextKey);
                    nextNode.predecessors.push(node.key);
                }
            }

            const retroQueue = [];

            for (const node of nodes.values()) {
                node.degree = node.successors.length;

                const winner = getWinner(node.state);
                if (winner === AI_PLAYER) {
                    node.value = OUTCOME_AI_WIN;
                    node.depth = 0;
                    retroQueue.push(node);
                } else if (winner === HUMAN_PLAYER) {
                    node.value = OUTCOME_AI_LOSS;
                    node.depth = 0;
                    retroQueue.push(node);
                }
            }

            for (let cursor = 0; cursor < retroQueue.length; cursor++) {
                const solved = retroQueue[cursor];

                for (const predecessorKey of solved.predecessors) {
                    const predecessor = nodes.get(predecessorKey);
                    if (predecessor.value !== null) continue;

                    const isAiTurn = predecessor.state.turn === AI_PLAYER;
                    const moverCanChooseSolvedResult =
                        (isAiTurn && solved.value === OUTCOME_AI_WIN) ||
                        (!isAiTurn && solved.value === OUTCOME_AI_LOSS);

                    if (moverCanChooseSolvedResult) {
                        predecessor.value = solved.value;
                        predecessor.depth = solved.depth + 1;
                        retroQueue.push(predecessor);
                        continue;
                    }

                    predecessor.degree--;
                    if (predecessor.degree === 0) {
                        predecessor.value = isAiTurn ? OUTCOME_AI_LOSS : OUTCOME_AI_WIN;
                        predecessor.depth = 1 + Math.max(...predecessor.successors.map(key => nodes.get(key).depth || 0));
                        retroQueue.push(predecessor);
                    }
                }
            }

            for (const node of nodes.values()) {
                if (node.value === null) {
                    node.value = OUTCOME_DRAW;
                    node.depth = Infinity;
                }
            }

            return { nodes };
        }

        function createSolverNode(state) {
            return {
                state,
                key: stateKey(state),
                successors: [],
                predecessors: [],
                value: null,
                depth: null,
                degree: 0
            };
        }

        function applyStateMove(state, pos) {
            const nextState = {
                x: [...state.x],
                o: [...state.o],
                turn: state.turn === HUMAN_PLAYER ? AI_PLAYER : HUMAN_PLAYER
            };
            const moves = state.turn === HUMAN_PLAYER ? nextState.x : nextState.o;

            moves.push(pos);
            if (moves.length > MAX_MOVES_PER_PLAYER) {
                moves.shift();
            }

            return nextState;
        }

        function getWinner(state) {
            const xWins = checkWinForMoves(state.x);
            const oWins = checkWinForMoves(state.o);

            if (xWins && oWins) {
                return state.turn === HUMAN_PLAYER ? AI_PLAYER : HUMAN_PLAYER;
            }

            if (xWins) return HUMAN_PLAYER;
            if (oWins) return AI_PLAYER;
            return null;
        }

        function getEmptyFromMoves(xM, oM) {
            const occupied = new Set([...xM, ...oM]);
            const empty = [];

            for (let i = 0; i < BOARD_SIZE; i++) {
                if (!occupied.has(i)) empty.push(i);
            }

            return empty;
        }

        function compareAiOptions(a, b) {
            if (a.outcome !== b.outcome) {
                return b.outcome - a.outcome;
            }

            if (a.outcome === OUTCOME_AI_WIN && a.depth !== b.depth) {
                return a.depth - b.depth;
            }

            if (a.outcome === OUTCOME_AI_LOSS && a.depth !== b.depth) {
                return b.depth - a.depth;
            }

            if (a.tieScore !== b.tieScore) {
                return b.tieScore - a.tieScore;
            }

            return a.pos - b.pos;
        }

        function evaluateEmergencyState(state) {
            const winner = getWinner(state);
            if (winner === AI_PLAYER) return OUTCOME_AI_WIN;
            if (winner === HUMAN_PLAYER) return OUTCOME_AI_LOSS;
            return OUTCOME_DRAW;
        }

        function scoreMoveShape(state, pos) {
            let score = POSITION_WEIGHTS[pos];

            score += countThreats(state.o, state.x) * 6;
            score -= countThreats(state.x, state.o) * 7;
            score += getLinePressure(state.o, state.x);
            score -= getLinePressure(state.x, state.o);
            score += getRemovalShapeScore(state.o, state.x);
            score -= getRemovalShapeScore(state.x, state.o);

            return score;
        }

        function countThreats(myMoves, oppMoves) {
            let threats = 0;

            for (const pattern of winPatterns) {
                const myCount = countMovesInPattern(myMoves, pattern);
                const oppCount = countMovesInPattern(oppMoves, pattern);
                if (myCount === 2 && oppCount === 0) threats++;
            }

            return threats;
        }

        function getLinePressure(myMoves, oppMoves) {
            let score = 0;

            for (const pattern of winPatterns) {
                const myCount = countMovesInPattern(myMoves, pattern);
                const oppCount = countMovesInPattern(oppMoves, pattern);

                if (oppCount === 0) {
                    score += myCount * myCount;
                }
            }

            return score;
        }

        function getRemovalShapeScore(myMoves, oppMoves) {
            if (myMoves.length < MAX_MOVES_PER_PLAYER) return 0;

            const willRemove = myMoves[0];
            let score = 0;

            for (const pattern of winPatterns) {
                if (!pattern.includes(willRemove)) continue;

                const myCount = countMovesInPattern(myMoves, pattern);
                const oppCount = countMovesInPattern(oppMoves, pattern);

                if (myCount === 2 && oppCount === 0) score -= 4;
                if (myCount === 3 && oppCount === 0) score -= 10;
            }

            if (willRemove === 4) score -= 2;
            if ([0, 2, 6, 8].includes(willRemove)) score -= 1;

            return score;
        }

        function countMovesInPattern(moves, pattern) {
            let count = 0;

            for (const index of pattern) {
                if (moves.includes(index)) count++;
            }

            return count;
        }

        function warmSolver() {
            setTimeout(() => {
                if (!perfectSolver) {
                    perfectSolver = buildPerfectSolver();
                }
            }, 0);
        }

        createBoard();
        recordState();
        warmSolver();
    </script>
</body>
</html>
